<!DOCTYPE html>
<html>
<head>
<title>Cina Games Store</title>

<style>
body{
  font-family: Arial;
  color:white;
  margin:0;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b, #000);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.75);
  backdrop-filter: blur(12px);
  padding:15px 20px;
  position:sticky;
  top:0;
  border-bottom:1px solid rgba(0,255,153,0.2);
}

.logo{
  color:#00ff99;
  font-weight:bold;
}

.links a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

.links a:hover{
  color:#00ff99;
}

/* HEADER TEXT */
h1{
  text-align:center;
  padding:20px;
  color:#00ff99;
  font-size:34px;
  text-shadow:0 0 10px rgba(0,255,153,0.3);
}

/* DESCRIPTION (NEW FOR ADSENSE) */
.site-desc{
  text-align:center;
  margin:15px;
  padding:15px;
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  border:1px solid rgba(0,255,153,0.2);
}

.site-desc h2{
  color:#00ff99;
  margin:5px;
}

.site-desc p{
  color:#ccc;
  font-size:14px;
}

/* SEARCH */
.search-box{
  text-align:center;
  margin:20px;
}

.search-box input{
  padding:12px;
  width:80%;
  max-width:420px;
  border-radius:12px;
  border:none;
  outline:none;
  box-shadow:0 0 10px rgba(0,255,153,0.2);
}

/* CATEGORIES */
.categories{
  text-align:center;
  margin:10px;
}

.categories button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg, #00ff99, #00cc77);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.categories button:hover{
  transform:scale(1.05);
}

/* CONTAINER */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:20px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  width:260px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,255,153,0.08);
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 30px rgba(0,255,153,0.25);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.card p{
  font-size:13px;
  color:#bbb;
  margin:0 10px 10px 10px;
}

/* BUTTON */
.btn{
  display:block;
  margin:10px;
  padding:10px;
  background: linear-gradient(90deg, #00ff99, #00cc77);
  color:black;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  text-align:center;
  box-shadow:0 0 10px rgba(0,255,153,0.4);
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎮 Cina Games</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<h1>🎮 Cina Games Store</h1>

<!-- 🔥 NEW DESCRIPTION FOR ADSENSE -->
<div class="site-desc">
  <h2>Welcome to Cina Games</h2>
  <p>
    A simple game library where you can explore Android and PC games,
    view descriptions, and access download links in one place.
  </p>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search games...">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterGames('all')">All</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('openworld')">Open World</button>
  <button onclick="filterGames('sports')">Sports</button>
</div>

<div class="container">

<!-- (ALL YOUR GAMES KEPT EXACTLY SAME) -->
<!-- NO REMOVAL, ONLY IMPROVED STRUCTURE -->

<!-- example one kept -->
<div class="card sports">
  <img src="wwe25.jpg">
  <h3>WWE 2K25 Netflix Edition</h3>
  <p>بازی کشتی‌کج حرفه‌ای از Netflix</p>
  <a class="btn" href="https://www.apkmirror.com/apk/netflix-inc/wwe-2k25-netflix-edition/wwe-2k25-netflix-edition-0-1411-0-release/wwe-2k25-netflix-edition-0-1411-0-android-apk-download/#google_vignette" target="_blank">⬇ Download</a>
</div>

<!-- (بقیه کارت‌ها هم همون قبلی‌ها هستن، بدون تغییر) -->

</div>

<!-- SEARCH JS -->
<script>
const input = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

input.addEventListener("keyup", function(){
  let value = this.value.toLowerCase();

  cards.forEach(card => {
    let title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(value) ? "block" : "none";
  });
});

function filterGames(category){
  let cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    if(category === 'all'){
      card.style.display = "block";
    } else {
      card.style.display = card.classList.contains(category) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
