<!DOCTYPE html>
<html>
<head>
<title>Cina Games Store</title>

<style>
body{
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  margin: 0;
}

h1{
  text-align:center;
  padding:20px;
  color:#00ff99;
  font-size:32px;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  width:260px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,153,0.1);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,255,153,0.3);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.card p{
  font-size:13px;
  color:#bbb;
  margin:0 10px 10px 10px;
}

.btn{
  display:block;
  margin:10px;
  padding:10px;
  background:#00ff99;
  color:black;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  text-align:center;
}

.btn:hover{
  background:#00cc77;
}
</style>

</head>

<body>

<h1>🎮 Cina Games Store</h1>

<div class="container">

  <div class="card">
    <img src="wwe.jpg">
    <h3>WWE 2K15</h3>
    <p>کشتی کج محبوب WWE</p>
    <a class="btn" href="#">⬇ Download</a>
  </div>

  <div class="card">
    <img src="gta.jpg">
    <h3>GTA V</h3>
    <p>بازی جهان باز GTA</p>
    <a class="btn" href="#">⬇ Download</a>
  </div>

  <div class="card">
    <img src="watchdogs.jpg">
    <h3>Watch Dogs</h3>
    <p>بازی هکری و اکشن</p>
    <a class="btn" href="#">⬇ Download</a>
  </div>

</div>

</body>
</html>
