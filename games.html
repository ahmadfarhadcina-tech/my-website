<!DOCTYPE html>
<html>
<head>
  <title>Cina Games Store</title>

  <style>
    body{
      font-family: Arial;
      background:#0f0f0f;
      color:white;
      margin:0;
      text-align:center;
    }

    h1{
      color:#00ff99;
      padding:20px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1e1e1e;
      width:250px;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 0 10px black;
    }

    .card img{
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .card h3{
      margin:10px 0;
    }

    .btn{
      display:block;
      margin:10px;
      padding:10px;
      background:#00ff99;
      color:black;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
    }

    .btn:hover{
      background:#00cc77;
    }
  </style>

</head>

<body>

<h1>🎮 Cina Games Store</h1>

<div class="container">

  <div class="card">
    <img src="wwe.jpg">
    <h3>WWE 2K15</h3>
    <a class="btn" href="#">⬇ Download</a>
  </div>

  <div class="card">
    <img src="gta.jpg">
    <h3>GTA V</h3>
    <a class="btn" href="#">⬇ Download</a>
  </div>

  <div class="card">
    <img src="watchdogs.jpg">
    <h3>Watch Dogs</h3>
    <a class="btn" href="#">⬇ Download</a>
  </div>

</div>

</body>
</html>
