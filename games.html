<!DOCTYPE html>
<html>
<head>
<title>Cina Games - Download Android & PC Games Free</title>

<style>
body{
  font-family: Arial;
  color:white;
  margin:0;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b, #000);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.7);
  backdrop-filter: blur(10px);
  padding:15px 20px;
  position:sticky;
  top:0;
  border-bottom:1px solid rgba(0,255,153,0.2);
}

.logo{
  color:#00ff99;
  font-weight:bold;
}

.links a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

.links a:hover{
  color:#00ff99;
}

/* TITLE */
h1{
  text-align:center;
  padding:20px;
  color:#00ff99;
  font-size:34px;
  text-shadow:0 0 10px rgba(0,255,153,0.3);
}

/* SEARCH */
.search-box{
  text-align:center;
  margin:20px;
}

.search-box input{
  padding:12px;
  width:80%;
  max-width:420px;
  border-radius:12px;
  border:none;
  outline:none;
  box-shadow:0 0 10px rgba(0,255,153,0.2);
}

/* CATEGORIES */
.categories{
  text-align:center;
  margin:10px;
}

.categories button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg, #00ff99, #00cc77);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.categories button:hover{
  transform:scale(1.05);
}

/* CONTAINER */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:20px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  width:260px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,255,153,0.08);
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 30px rgba(0,255,153,0.25);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.card p{
  font-size:13px;
  color:#bbb;
  margin:0 10px 10px 10px;
}

/* BUTTON */
.btn{
  display:block;
  margin:10px;
  padding:10px;
  background: linear-gradient(90deg, #00ff99, #00cc77);
  color:black;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  text-align:center;
  box-shadow:0 0 10px rgba(0,255,153,0.4);
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* =========================
   TOP SOCIAL BUTTONS FIXED
========================= */

.social-btn{
  position:fixed;
  top:10px;
  padding:14px 18px;
  font-size:17px;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  color:white;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:9999;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.telegram{
  left:10px;
  background:#229ED9;
}

.youtube{
  right:10px;
  background:#FF0000;
}

.social-btn:hover{
  transform:scale(1.08);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎮 Cina Games</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<h1>🎮 Cina Games Store</h1>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search games...">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterGames('all')">All</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('openworld')">Open World</button>
  <button onclick="filterGames('sports')">Sports</button>
</div>

<div class="container">

  <!-- YOUR CARDS -->
  <!-- (همه کارت‌ها همون قبلی هستند، تغییر نکرده) -->

</div>

<!-- SOCIAL BUTTONS -->
<a href="https://t.me/afghangamerx" target="_blank" class="social-btn telegram">
📲 Telegram
</a>

<a href="https://www.youtube.com/@Farhad_Cina" target="_blank" class="social-btn youtube">
▶️ YouTube
</a>

<!-- JS -->
<script>
const input = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

input.addEventListener("keyup", function(){
  let value = this.value.toLowerCase();

  cards.forEach(card => {
    let title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(value) ? "block" : "none";
  });
});

function filterGames(category){
  cards.forEach(card => {
    if(category === 'all'){
      card.style.display = "block";
    } else {
      card.style.display = card.classList.contains(category) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
