<!DOCTYPE html>
<html>
<head>
<title>Cina Games Store</title>

<style>
body{
  font-family: Arial;
  color:white;
  margin:0;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b, #000);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.7);
  backdrop-filter: blur(10px);
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  color:#00ff99;
  font-weight:bold;
}

/* TITLE */
h1{
  text-align:center;
  padding:20px;
  color:#00ff99;
}

/* SEARCH */
.search-box{
  text-align:center;
  margin:15px;
}

.search-box input{
  padding:10px;
  width:80%;
  max-width:400px;
  border-radius:10px;
  border:none;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
  padding:15px;
}

/* CARD (FIXED SQUARE) */
.card{
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
  aspect-ratio: 1 / 1;   /* 🔥 مهم: مربع واقعی */
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:55%;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  margin:6px;
}

.card p{
  font-size:11px;
  color:#ccc;
  margin:0 6px;
  flex:1;
}

/* BUTTON */
.btn{
  margin:6px;
  padding:8px;
  background:#00ff99;
  color:black;
  text-align:center;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

/* MOBILE FIX */
@media(max-width:600px){
  .container{
    grid-template-columns:repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">🎮 Cina Games</div>
</nav>

<h1>🎮 Games Store</h1>

<div class="search-box">
  <input type="text" placeholder="Search games...">
</div>

<div class="container">

  <!-- APP APK -->
  <div class="card">
    <img src="cina-app.jpg">
    <h3>Cina Games APK</h3>
    <p>اپ رسمی سایت برای دسترسی سریع به بازی‌ها</p>
    <a class="btn" href="https://www.mediafire.com/file/ihagxbiw448ssz2/CinaGames.apk/file">Download</a>
  </div>

  <!-- BULLY -->
  <div class="card">
    <img src="bully.jpg">
    <h3>Bully Anniversary</h3>
    <p>بازی جهان‌باز راکستار</p>
    <a class="btn" href="https://apkvision.org/games/action/bullyanniversaryeditionsapk-54560/">Download</a>
  </div>

  <!-- DARK WALLPAPER -->
  <div class="card">
    <img src="dark-wallpaper.jpg">
    <h3>Dark Wallpaper</h3>
    <p>والپیپرهای تیره با کیفیت بالا</p>
    <a class="btn" href="https://www.mediafire.com/file/456vkzxxtq61bgy/Dark_Person_Wallpaper_1.0.apk/file">Download</a>
  </div>

  <!-- WWE -->
  <div class="card">
    <img src="wwe25.jpg">
    <h3>WWE 2K25</h3>
    <p>کشتی کج حرفه‌ای</p>
    <a class="btn" href="wwe25.html">Open Page</a>
  </div>

</div>

</body>
</html>
