<!DOCTYPE html>
<html>
<head>
<title>Cina Games - Download Android & PC Games Free</title>

<style>
body{
  font-family: Arial;
  color:white;
  margin:0;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b, #000);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.7);
  backdrop-filter: blur(10px);
  padding:15px 20px;
  position:sticky;
  top:0;
  border-bottom:1px solid rgba(0,255,153,0.2);
  z-index:1000;
}

.logo{
  color:#00ff99;
  font-weight:bold;
}

.links a{
  color:white;
  text-decoration:none;
  margin-left:15px;
}

.links a:hover{
  color:#00ff99;
}

/* TITLE */
h1{
  text-align:center;
  padding:20px;
  color:#00ff99;
  font-size:34px;
}

/* SEARCH */
.search-box{
  text-align:center;
  margin:20px;
}

.search-box input{
  padding:12px;
  width:80%;
  max-width:420px;
  border-radius:12px;
  border:none;
  outline:none;
}

/* CATEGORIES */
.categories{
  text-align:center;
  margin:10px;
}

.categories button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg, #00ff99, #00cc77);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* CONTAINER */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:20px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.05);
  width:260px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* BUTTON */
.btn{
  display:block;
  margin:10px;
  padding:10px;
  background: linear-gradient(90deg, #00ff99, #00cc77);
  color:black;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  text-align:center;
}

/* ===== TOP FIXED BUTTONS ===== */
.top-buttons{
  position:fixed;
  top:70px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:9999;
}

.top-buttons a{
  padding:14px 18px;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  text-align:center;
  width:150px;
}

.telegram{
  background:#229ED9;
}

.youtube{
  background:#FF0000;
}

.top-buttons a:hover{
  transform:scale(1.05);
  transition:0.2s;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎮 Cina Games</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<h1>🎮 Cina Games Store</h1>

<!-- TOP FIXED SOCIAL BUTTONS -->
<div class="top-buttons">
  <a class="telegram" href="https://t.me/afghangamerx" target="_blank">📲 Telegram</a>
  <a class="youtube" href="https://www.youtube.com/@Farhad_Cina" target="_blank">▶ YouTube</a>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search games...">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterGames('all')">All</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('openworld')">Open World</button>
  <button onclick="filterGames('sports')">Sports</button>
</div>

<div class="container">

  <div class="card action">
    <img src="cod-strike-team.jpg">
    <h3>Call of Duty: Strike Team</h3>
    <a class="btn" href="https://apkaward.com/call-of-duty-strike-team-fix-android-10" target="_blank">Download</a>
  </div>

  <div class="card sports">
    <img src="dls26.jpg">
    <h3>DLS 26</h3>
    <a class="btn" href="#">Download</a>
  </div>

</div>

<script>
const input = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

input.addEventListener("keyup", function(){
  let value = this.value.toLowerCase();

  cards.forEach(card => {
    let title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(value) ? "block" : "none";
  });
});

function filterGames(category){
  cards.forEach(card => {
    if(category === 'all'){
      card.style.display = "block";
    } else {
      card.style.display = card.classList.contains(category) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
