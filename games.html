/* CONTAINER */
.container{

  justify-content:center;
  gap:25px;
  padding:20px;
}

/* CARD (❌ ANIMATION REMOVED) */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  width:260px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,255,153,0.08);
  border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
  transform:none;
}

/* IMAGE */
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.card p{
  font-size:13px;

  margin:0 10px 10px 10px;
}

/* BUTTON */
.btn{

/* 🔵 BIG SOCIAL BUTTONS */
.social{

  padding:16px 22px;

  box-shadow:0 0 15px rgba(0,0,0,0.5);

.telegram{

  background:#229ED9;
  color:white;
}

.youtube{

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎮 Cina Games</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>

</nav>

<h1>🎮 Cina Games Store</h1>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search games...">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterGames('all')">All</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('openworld')">Open World</button>
  <button onclick="filterGames('sports')">Sports</button>
</div>

<!-- GAMES -->
<div class="container">

  <div class="card action">
    <img src="cod-strike-team.jpg">
    <h3>Call of Duty: Strike Team</h3>
    <p>بازی اکشن تیراندازی با حالت داستانی آفلاین</p>
    <a class="btn" href="https://apkaward.com/call-of-duty-strike-team-fix-android-10">⬇ Download</a>
  </div>

  <div class="card sports">
    <img src="dls26.jpg">
    <h3>DLS 26</h3>
    <p>بازی فوتبال جدید Dream League Soccer</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.firsttouchgames.dls7">⬇ Download</a>
  </div>

  <div class="card action">
    <img src="pubg.jpg">
    <h3>PUBG Mobile</h3>
    <p>بتل رویال محبوب</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.tencent.ig">⬇ Download</a>
  </div>

  <!-- بقیه کارت‌ها هم مثل قبل هستند (حذف نشدند) -->

</div>

<!-- SOCIAL BUTTONS -->
<a class="social telegram" href="https://t.me/afghangamerx">📲 Telegram</a>
<a class="social youtube" href="https://www.youtube.com/@Farhad_Cina">▶ YouTube</a>

<!-- JS -->
<script>
const input = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

input.addEventListener("keyup", function(){
  let value = this.value.toLowerCase();
  cards.forEach(card => {
    let title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(value) ? "block" : "none";
  });
});

function filterGames(category){
  cards.forEach(card => {
    if(category === "all"){
      card.style.display = "block";
    } else {
      card.style.display = card.classList.contains(category) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
