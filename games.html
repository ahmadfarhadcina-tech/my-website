<!DOCTYPE html>
<html>
<head>
<title>Cina Games - Download Android & PC Games Free</title>

<style>
body{
  font-family: Arial;
  color:white;
  margin:0;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b, #000);
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(17,17,17,0.8);
  backdrop-filter: blur(10px);
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom:1px solid rgba(0,255,153,0.2);
}

/* LOGO */
.logo{
  color:#00ff99;
  font-weight:bold;
}

/* LINKS */
.links a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  transition:0.3s;
}
.links a:hover{
  color:#00ff99;
}

/* TITLE */
h1{
  text-align:center;
  padding:20px;
  color:#00ff99;
  font-size:34px;
}

/* SEARCH */
.search-box{
  text-align:center;
  margin:20px;
}

.search-box input{
  padding:12px;
  width:80%;
  max-width:420px;
  border-radius:12px;
  border:none;
  outline:none;
}

/* CATEGORIES */
.categories{
  text-align:center;
  margin:10px;
}

.categories button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg,#00ff99,#00cc77);
  color:black;
  font-weight:bold;
}

/* CONTAINER */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:20px;
}

/* CARD (FIXED LOOK) */
.card{
  background: rgba(255,255,255,0.05);
  width:260px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,255,153,0.08);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.card p{
  font-size:13px;
  color:#bbb;
  margin:0 10px 10px;
}

/* BUTTON */
.btn{
  display:block;
  margin:10px;
  padding:10px;
  background: linear-gradient(90deg,#00ff99,#00cc77);
  color:black;
  text-decoration:none;
  border-radius:10px;
  text-align:center;
}

/* 🔥 BIG TOP SOCIAL BUTTONS */
.social-top{
  position:fixed;
  top:10px;
  right:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:2000;
}

.social-top a{
  padding:14px 18px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  text-decoration:none;
  font-size:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
  transition:0.3s;
}

.social-top a:hover{
  transform:scale(1.08);
}

/* COLORS */
.telegram{
  background:#229ED9;
}

.youtube{
  background:#FF0000;
}
</style>
</head>

<body>

<!-- 🔥 BIG TOP BUTTONS -->
<div class="social-top">
  <a class="telegram" href="https://t.me/afghangamerx" target="_blank">📲 Telegram</a>
  <a class="youtube" href="https://www.youtube.com/@Farhad_Cina" target="_blank">▶ YouTube</a>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎮 Cina Games</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<h1>🎮 Cina Games Store</h1>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search games...">
</div>

<!-- CATEGORIES -->
<div class="categories">
  <button onclick="filterGames('all')">All</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('openworld')">Open World</button>
  <button onclick="filterGames('sports')">Sports</button>
</div>

<!-- GAMES -->
<div class="container">

  <div class="card action">
    <img src="cina-app.jpg">
    <h3>Cina Games APK</h3>
    <p>اپ رسمی سایت برای دسترسی سریع به بازی‌ها</p>
    <a class="btn" href="#">Download</a>
  </div>

  <div class="card openworld">
    <img src="bully.jpg">
    <h3>Bully Anniversary</h3>
    <p>بازی جهان باز مدرسه‌ای از Rockstar</p>
    <a class="btn" href="#">Download</a>
  </div>

</div>

<script>
function filterGames(cat){
  let cards=document.querySelectorAll(".card");
  cards.forEach(c=>{
    c.style.display=(cat==="all"||c.classList.contains(cat))?"block":"none";
  });
}
</script>

</body>
</html>
