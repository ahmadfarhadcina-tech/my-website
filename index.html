<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cina Games Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* TOP BAR */
.topbar{
  position:sticky;
  top:0;
  background:#111;
  padding:12px;
  text-align:center;
  font-size:20px;
  color:#00ff99;
  font-weight:bold;
  border-bottom:1px solid #00ff9955;
}

/* CATEGORY */
.categories{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.categories button{
  flex:none;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
}

/* STORE GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:#1a1a1a;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3{
  margin:8px;
  font-size:14px;
}

.card p{
  margin:0 8px 8px;
  font-size:12px;
  color:#aaa;
}

.btn{
  display:block;
  margin:8px;
  padding:8px;
  background:#00ff99;
  color:black;
  text-align:center;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

/* BOTTOM NAV (APP STYLE) */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:1px solid #00ff99;
}

.bottom a{
  flex:1;
  text-align:center;
  padding:10px;
  color:white;
  text-decoration:none;
  font-size:12px;
}

.bottom a:hover{
  color:#00ff99;
}
</style>

</head>

<body>

<div class="topbar">🎮 Cina Games Store</div>

<div class="categories">
  <button>All</button>
  <button>Action</button>
  <button>Open World</button>
  <button>Sports</button>
  <button>Tools</button>
</div>

<div class="grid">

  <div class="card">
    <img src="dark-wallpaper.jpg">
    <h3>Dark Wallpaper</h3>
    <p>HD Wallpapers pack</p>
    <a class="btn" href="https://www.mediafire.com/file/456vkzxxtq61bgy/Dark_Person_Wallpaper_1.0.apk/file">Download</a>
  </div>

  <div class="card">
    <img src="wwe25.jpg">
    <h3>WWE 2K25</h3>
    <p>Action Wrestling Game</p>
    <a class="btn" href="https://example.com">Download</a>
  </div>

</div>

<div class="bottom">
  <a href="#home">🏠 Home</a>
  <a href="games.html">🎮 Games</a>
  <a href="#alerts">🔔 Alerts</a>
  <a href="#settings">⚙️ Settings</a>
</div>

</body>
</html>
